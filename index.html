<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#111113" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <title>VG Orders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #1f1f22;
        --panel: #132014;
        --card: #222228;
        --card-hover: #2a2a32;
        --border: #2e2e36;
        --text: #eeeef0;
        --text-mid: #a0a0ac;
        --text-dim: #6a6a78;
        --gold: #c9a24e;
        --gold-soft: rgba(201, 162, 78, 0.1);
        --gold-mid: rgba(201, 162, 78, 0.25);
        --red: #d44;
        --red-soft: rgba(221, 68, 68, 0.12);
        --blue: #5b8def;
        --blue-soft: rgba(91, 141, 239, 0.12);
        --radius: 8px;
        --ease: cubic-bezier(0.4, 0, 0.2, 1);
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        font-family: "Outfit", sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      /* ═══════════ TABLES VIEW ═══════════ */
      .tables-view {
        position: fixed;
        inset: 0;
        background: var(--bg);
        z-index: 100;
        display: flex;
        flex-direction: column;
        transition: transform 0.3s var(--ease);
      }
      .tables-view.hidden {
        transform: translateX(-100%);
        pointer-events: none;
      }
      .tables-header {
        padding: 20px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
        text-align: center;
      }
      .tables-logo {
        font-family: "Fraunces", serif;
        font-size: 1.8rem;
        color: var(--gold);
        margin-bottom: 4px;
      }
      .tables-subtitle {
        color: var(--text-dim);
        font-size: 0.85rem;
      }
      .tables-grid-wrapper {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
      }
      .tables-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
        gap: 12px;
        max-width: 700px;
        margin: 0 auto;
      }
      .table-btn {
        aspect-ratio: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        background: var(--card);
        border: 2px solid var(--border);
        border-radius: 12px;
        color: var(--text);
        font-size: 1.3rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s var(--ease);
        position: relative;
      }
      .table-btn:hover {
        border-color: var(--gold);
        background: var(--gold-soft);
        color: var(--gold);
        transform: scale(1.03);
      }
      .table-btn:active {
        transform: scale(0.97);
      }
      .table-btn .table-items {
        font-size: 0.65rem;
        font-weight: 600;
        color: var(--text-dim);
        background: rgba(255,255,255,0.08);
        padding: 2px 6px;
        border-radius: 8px;
      }
      .table-btn.has-items {
        border-color: var(--gold-mid);
        background: var(--gold-soft);
      }
      .table-btn.has-items .table-items {
        background: var(--gold-mid);
        color: var(--gold);
      }
      .table-btn .allergy-dot {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 10px;
        height: 10px;
        background: var(--red);
        border-radius: 50%;
        border: 2px solid var(--card);
      }
      .table-btn.is-open {
        border-color: #4a9d6f;
        background: rgba(74, 157, 111, 0.08);
      }
      .table-btn.is-open .table-items {
        background: rgba(74, 157, 111, 0.15);
        color: #4a9d6f;
      }
      .table-btn.is-open.has-items {
        border-color: var(--gold-mid);
        background: var(--gold-soft);
      }
      .table-btn.is-open.has-items .table-items {
        background: var(--gold-mid);
        color: var(--gold);
      }
      .open-indicator {
        position: absolute;
        top: 5px;
        left: 6px;
        width: 7px;
        height: 7px;
        background: #4a9d6f;
        border-radius: 50%;
        border: 1.5px solid var(--card);
      }
      .table-btn.pressing {
        transform: scale(0.9) !important;
        border-color: var(--red) !important;
        background: var(--red-soft) !important;
        transition: transform 0.5s var(--ease), border-color 0.5s var(--ease), background 0.5s var(--ease) !important;
      }

      /* ═══════════ MAIN APP VIEW ═══════════ */
      .app-view {
        display: flex;
        flex-direction: column;
        height: 100%;
        width: 100%;
      }
      .app-view.hidden {
        display: none;
      }

      /* ═══════════ LAYOUT ═══════════ */
      .shell {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      .menu-side {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .menu-topbar {
        height: 54px;
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 12px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
        flex-shrink: 0;
      }

      .back-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--text-mid);
        padding: 6px 12px;
        border-radius: 6px;
        font-family: inherit;
        font-size: 0.8rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s var(--ease);
        flex-shrink: 0;
      }
      .back-btn:hover {
        border-color: var(--gold);
        color: var(--gold);
        background: var(--gold-soft);
      }
      .back-btn:active {
        transform: scale(0.95);
      }

      .brand {
        font-family: "Fraunces", serif;
        font-weight: 700;
        font-size: 1.1rem;
        color: var(--gold);
        letter-spacing: -0.02em;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .current-table-badge {
        background: var(--gold-soft);
        color: var(--gold);
        font-family: "Outfit", sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 12px;
      }

      /* ── Search ── */
      .search-container {
        flex: 1;
        max-width: 260px;
        position: relative;
        margin-left: auto;
      }
      .search-input {
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        color: var(--text);
        font-family: inherit;
        font-size: 0.82rem;
        padding: 8px 32px 8px 14px;
        outline: none;
        transition: border-color 0.15s, background 0.15s;
      }
      .search-input::placeholder {
        color: var(--text-dim);
      }
      .search-input:focus {
        border-color: var(--gold);
        background: var(--card-hover);
      }
      .search-clear {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-dim);
        font-size: 0.75rem;
        cursor: pointer;
        padding: 4px;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .search-container.has-query .search-clear {
        opacity: 1;
      }
      .search-clear:hover {
        color: var(--text);
      }

      /* ── Search Results ── */
      .search-results {
        display: none;
        padding-bottom: 12px;
      }
      .search-results.active {
        display: block;
      }
      .search-results-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 0 12px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 12px;
      }
      .search-results-title {
        font-size: 0.85rem;
        color: var(--text-mid);
        font-weight: 500;
      }
      .search-results-count {
        font-size: 0.75rem;
        color: var(--text-dim);
      }
      .search-results-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 8px;
      }
      .search-item-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
        cursor: pointer;
        transition: all 0.12s var(--ease);
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .search-item-card:active {
        transform: scale(0.97);
      }
      .search-item-card:hover {
        border-color: var(--gold);
        background: var(--card-hover);
      }
      .search-item-card .iname {
        font-weight: 600;
        font-size: 0.88rem;
        line-height: 1.25;
      }
      .search-item-card .iprice {
        font-size: 0.75rem;
        color: var(--gold);
        font-weight: 500;
      }
      .search-item-card .imeta {
        font-size: 0.68rem;
        color: var(--text-dim);
        margin-top: 2px;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .search-item-card .imeta .loc {
        background: var(--gold-soft);
        color: var(--gold);
        padding: 2px 6px;
        border-radius: 3px;
        font-weight: 500;
      }
      .search-item-card .idietary {
        margin-top: 4px;
      }
      .search-no-results {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-dim);
      }
      .search-no-results .nricon {
        font-size: 2rem;
        margin-bottom: 8px;
        opacity: 0.4;
      }
      .search-no-results p {
        font-size: 0.85rem;
      }
      .search-item-card mark {
        background: var(--gold-mid);
        color: var(--text);
        padding: 0 2px;
        border-radius: 2px;
      }

      .breadcrumbs {
        display: none;
      }

      /* ── Menu tabs ── */
      .menu-tabs {
        display: flex;
        gap: 4px;
        padding: 10px 20px;
        overflow-x: auto;
        flex-shrink: 0;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        scrollbar-width: none;
      }
      .menu-tabs::-webkit-scrollbar {
        display: none;
      }

      .menu-tab {
        flex-shrink: 0;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--text-dim);
        cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.15s var(--ease);
        display: flex;
        align-items: center;
        gap: 7px;
        background: transparent;
      }
      .menu-tab:hover {
        color: var(--text-mid);
        background: var(--card);
      }
      .menu-tab.active {
        color: var(--gold);
        background: var(--gold-soft);
        border-color: var(--gold-mid);
      }
      .menu-tab .ti {
        font-size: 1rem;
      }

      /* ── Section pills ── */
      .section-tabs {
        display: flex;
        gap: 2px;
        padding: 8px 20px;
        overflow-x: auto;
        flex-shrink: 0;
        background: var(--bg);
        scrollbar-width: none;
      }
      .section-tabs::-webkit-scrollbar {
        display: none;
      }

      .section-tab {
        flex-shrink: 0;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--text-dim);
        cursor: pointer;
        transition: all 0.15s var(--ease);
        border: none;
        background: transparent;
      }
      .section-tab:hover {
        color: var(--text-mid);
      }
      .section-tab.active {
        color: var(--text);
        background: var(--card);
      }

      .subsection-tabs {
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        display: none;
      }
      .subsection-tabs.visible {
        display: flex;
      }
      .subsection-tabs .section-tab.active {
        color: var(--gold);
        background: var(--gold-soft);
      }

      /* ── Items grid ── */
      .items-area {
        flex: 1;
        overflow-y: auto;
        padding: 12px 20px 80px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      .items-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
        gap: 8px;
      }

      .item-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
        cursor: pointer;
        transition: all 0.12s var(--ease);
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .item-card:active {
        transform: scale(0.97);
      }
      .item-card:hover {
        border-color: var(--gold);
        background: var(--card-hover);
      }

      .item-card .iname {
        font-weight: 600;
        font-size: 0.9rem;
        line-height: 1.25;
      }

      .item-card .iprice {
        font-size: 0.78rem;
        color: var(--gold);
        font-weight: 500;
        margin-top: 2px;
      }

      .item-card .idietary {
        display: flex;
        gap: 4px;
        margin-top: 4px;
        flex-wrap: wrap;
      }
      .ispecial {
        font-size: 0.75rem;
        color: var(--gold);
        font-style: italic;
        margin-top: 3px;
        line-height: 1.3;
        opacity: 0.85;
      }
      .challenge25 {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        font-style: normal;
        font-weight: 700;
        font-size: 0.7rem;
        background: #c0392b;
        color: #fff;
        border-radius: 4px;
        padding: 1px 5px;
        letter-spacing: 0.03em;
        vertical-align: middle;
      }
      .challenge25::before {
        content: "🛡️";
        font-size: 0.65rem;
      }
      .no-specials-msg {
        color: var(--text-dim);
        font-size: 0.9rem;
        padding: 24px 16px;
        grid-column: 1 / -1;
      }
      .dietary-tag {
        font-size: 0.6rem;
        font-weight: 700;
        padding: 2px 5px;
        border-radius: 3px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .dietary-tag.v {
        background: #2d5a2d;
        color: #90ee90;
      }
      .dietary-tag.vg {
        background: #1a4a1a;
        color: #7cfc00;
      }
      .dietary-tag.gf {
        background: #4a3a1a;
        color: #ffd700;
      }
      .dietary-tag.gfa {
        background: #3a3020;
        color: #daa520;
      }
      .dietary-tag.vga {
        background: #1a3a1a;
        color: #98fb98;
      }

      /* Misc Item Button */
      .misc-item-btn {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 140;
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--card);
        color: var(--text-mid);
        border: 1px solid var(--border);
        padding: 0 16px;
        height: 44px;
        border-radius: 22px;
        font-family: inherit;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        transition: all 0.15s var(--ease);
      }
      .misc-item-btn:hover {
        border-color: var(--gold);
        color: var(--gold);
        background: var(--gold-soft);
      }
      .misc-item-btn:active {
        transform: scale(0.95);
      }
      .misc-item-btn .misc-icon {
        font-size: 1rem;
      }

      /* Shared Note Button */
      .shared-note-btn {
        position: fixed;
        bottom: 20px;
        left: 150px;
        z-index: 140;
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--card);
        color: var(--text-mid);
        border: 1px solid var(--border);
        padding: 0 16px;
        height: 44px;
        border-radius: 22px;
        font-family: inherit;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        transition: all 0.15s var(--ease);
      }
      .shared-note-btn:hover {
        border-color: var(--gold);
        color: var(--gold);
        background: var(--gold-soft);
      }
      .shared-note-btn:active {
        transform: scale(0.95);
      }

      /* Shared Note Modal */
      .shared-note-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 350;
        align-items: center;
        justify-content: center;
      }
      .shared-note-overlay.open {
        display: flex;
      }

      .shared-note-modal {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        width: 400px;
        max-width: 94vw;
        max-height: 85vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        animation: modalIn 0.2s ease;
      }

      .shared-note-header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .shared-note-header h3 {
        font-size: 1rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .shared-note-sync {
        font-size: 0.7rem;
        color: var(--text-dim);
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .shared-note-sync.synced {
        color: #4ade80;
      }
      .shared-note-sync.syncing {
        color: var(--gold);
      }
      .sync-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
      }
      .shared-note-sync.syncing .sync-dot {
        animation: syncPulse 1s infinite;
      }
      @keyframes syncPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      .shared-note-body {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .shared-note-section label {
        display: block;
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-dim);
        margin-bottom: 6px;
      }

      .shared-note-section textarea {
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-family: inherit;
        font-size: 0.88rem;
        padding: 10px 12px;
        outline: none;
        min-height: 70px;
        resize: vertical;
        line-height: 1.5;
      }
      .shared-note-section textarea:focus {
        border-color: var(--gold);
      }
      .shared-note-section textarea::placeholder {
        color: var(--text-dim);
      }

      .shared-note-footer {
        padding: 14px 20px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 8px;
      }

      .shared-note-footer button {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        border: 1px solid var(--border);
      }
      .btn-shared-close {
        background: var(--card);
        color: var(--text-mid);
      }
      .btn-shared-refresh {
        background: var(--card);
        color: var(--text-mid);
      }
      .btn-shared-refresh:hover {
        border-color: var(--gold);
        color: var(--gold);
      }
      .btn-shared-save {
        background: var(--gold);
        color: var(--bg);
        border-color: var(--gold);
        font-weight: 600;
      }
      .btn-shared-save:hover {
        filter: brightness(1.1);
      }

      /* Misc Item Modal */
      .misc-modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 350;
        align-items: center;
        justify-content: center;
      }
      .misc-modal-overlay.open {
        display: flex;
      }

      .misc-modal {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        width: 360px;
        max-width: 92vw;
        padding: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        animation: modalIn 0.2s ease;
      }
      .misc-modal h3 {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .misc-modal h3 .misc-icon {
        font-size: 1.2rem;
      }
      .misc-modal label {
        display: block;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-dim);
        margin-bottom: 6px;
      }
      .misc-modal input,

      /* ── More dropdown ── */

      /* ═══════════ ORDER SHEET ═══════════ */
      .order-sheet-overlay {

      .order-sheet {

      .note-list {
        flex: 1;

        padding: 6px 0;

      .note-empty {

      .note-item-row {

      .toast {

      @keyframes toastOut {
        to { opacity: 0; transform: translateY(6px); }

      .note-item-usernote {
        font-size: 0.7rem;
        color: var(--blue);
        font-style: italic;
        margin-top: 1px;
        line-height: 1.3;

      .note-item-actions {
        display: flex;
        gap: 2px;
        flex-shrink: 0;
      }

      .note-mini-btn {

        border: none;

        font-size: 0.72rem;
        padding: 4px;

      }
      .note-mini-btn:hover {
        opacity: 1;
      }
      .note-mini-btn.del:hover {
        color: var(--red);
      }
      .note-mini-btn.edit:hover {
        color: var(--blue);
      }

      .order-sheet-footer {
        padding: 12px 20px 20px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .sheet-footer-btns {
        display: flex;
        gap: 8px;
      }

      .btn-back-to-menu {
        flex: 1;
        padding: 11px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text-mid);
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-back-to-menu:hover {
        border-color: var(--gold);
        color: var(--gold);
        background: var(--gold-soft);
      }

      .btn-reset {
        padding: 11px 16px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text-dim);
        font-family: inherit;
        font-size: 0.82rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .btn-reset:hover {
        border-color: var(--red);
        color: var(--red);
        background: var(--red-soft);
      }

      .order-fab {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 140;
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--gold);
        color: var(--bg);
        border: none;
        padding: 0 20px 0 16px;
        height: 52px;
        border-radius: 26px;
        font-family: inherit;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        transition: transform 0.15s, filter 0.15s;
      }
      .order-fab:hover {
        filter: brightness(1.08);
      }
      .order-fab:active {
        transform: scale(0.95);
      }
      .order-fab-icon {
        font-size: 1.1rem;
      }
      .order-fab-label {
        line-height: 1;
      }
      .order-fab-count {
        background: var(--bg);
        color: var(--gold);
        font-size: 0.7rem;
        font-weight: 800;
        min-width: 20px;
        height: 20px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 5px;
      }
      .order-fab-count:empty {
        display: none;
      }

      .toast-rack {
        position: fixed;
        bottom: 84px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 500;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        pointer-events: none;
      }

      @media (max-width: 500px) {
        .items-grid {
          grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        }
      }

      /* ═══════════ CHOICES MODAL ═══════════ */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 300;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.open {
        display: flex;
      }

      .modal {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        width: 380px;
        max-width: 92vw;
        max-height: 85vh;
        overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        animation: modalIn 0.2s ease;
      }
      @keyframes modalIn {
        from { opacity: 0; transform: scale(0.95) translateY(8px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }

      .modal-head {
        padding: 18px 20px 14px;
        border-bottom: 1px solid var(--border);
      }
      .modal-head h3 {
        font-size: 1rem;
        font-weight: 600;
      }
      .modal-head .modal-sub {
        font-size: 0.78rem;
        color: var(--text-dim);
        margin-top: 2px;
      }

      .modal-body {
        padding: 14px 20px 10px;
      }

      .choice-group {
        margin-bottom: 16px;
      }
      .choice-group-label {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-dim);
        margin-bottom: 8px;
      }

      .choice-options {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .choice-pill {
        padding: 7px 14px;
        border-radius: 20px;
        font-size: 0.82rem;
        font-weight: 500;
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--text-mid);
        cursor: pointer;
        transition: all 0.12s var(--ease);
      }
      .choice-pill:hover {
        border-color: var(--text-dim);
        color: var(--text);
      }
      .choice-pill.selected {
        background: var(--gold-soft);
        border-color: var(--gold);
        color: var(--gold);
      }

      .modal-note-section {
        margin-bottom: 10px;
      }
      .modal-note-section label {
        display: block;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-dim);
        margin-bottom: 8px;
      }
      .modal-note-input {
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-family: inherit;
        font-size: 0.82rem;
        padding: 8px 12px;
        outline: none;
        resize: none;
        min-height: 38px;
        transition: border-color 0.15s;
      }
      .modal-note-input:focus {
        border-color: var(--gold);
      }

      .modal-foot {
        padding: 10px 20px 18px;
        display: flex;
        gap: 8px;
      }
      .modal-foot button {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        border: 1px solid var(--border);
      }
      .btn-modal-cancel {
        background: var(--card);
        color: var(--text-mid);
      }
      .btn-modal-cancel:hover {
        border-color: var(--text-dim);
      }
      .btn-modal-add {
        background: var(--gold);
        color: var(--bg);
        border-color: var(--gold);
        font-weight: 600;
      }
      .btn-modal-add:hover {
        filter: brightness(1.1);
      }

      .inline-note-edit {
        margin-top: 6px;
        display: flex;
        gap: 6px;
      }
      .inline-note-edit input {
        flex: 1;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--text);
        font-family: inherit;
        font-size: 0.75rem;
        padding: 5px 8px;
        outline: none;
      }
      .inline-note-edit input:focus {
        border-color: var(--blue);
      }
      .inline-note-edit button {
        background: var(--blue-soft);
        border: 1px solid rgba(91, 141, 239, 0.3);
        color: var(--blue);
        border-radius: 5px;
        padding: 0 10px;
        cursor: pointer;
        font-size: 0.72rem;
        font-weight: 600;
        font-family: inherit;
        transition: all 0.12s;
      }
      .inline-note-edit button:hover {
        filter: brightness(1.2);
      }

      .confirm-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 400;
        align-items: center;
        justify-content: center;
      }
      .confirm-overlay.open {
        display: flex;
      }

      .confirm-box {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 28px 24px 20px;
        width: 300px;
        text-align: center;
      }
      .confirm-box p {
        font-size: 0.92rem;
        margin-bottom: 20px;
        line-height: 1.5;
        color: var(--text-mid);
      }
      .confirm-box .cbtns {
        display: flex;
        gap: 8px;
      }
      .confirm-box button {
        flex: 1;
        padding: 10px;
        border-radius: 6px;
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid var(--border);
        transition: all 0.15s;
      }
      .btn-ccancel {
        background: var(--card);
        color: var(--text-mid);
      }
      .btn-cconfirm {
        background: var(--red);
        color: #fff;
        border-color: var(--red) !important;
      }

      /* ═══════════ ALLERGIES MODAL ═══════════ */
      .allergies-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 360;
        align-items: center;
        justify-content: center;
      }
      .allergies-overlay.open {
        display: flex;
      }
      .allergies-modal {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        width: 420px;
        max-width: 94vw;
        max-height: 85vh;
        overflow-y: auto;
        padding: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        animation: modalIn 0.2s ease;
      }
      .allergies-modal h3 {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .allergies-modal .allergy-hint {
        font-size: 0.75rem;
        color: var(--text-dim);
        margin-bottom: 16px;
      }
      .allergen-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
        gap: 8px;
        margin-bottom: 16px;
      }
      .allergen-pill {
        padding: 10px 8px;
        border-radius: 8px;
        font-size: 0.75rem;
        font-weight: 600;
        background: var(--card);
        border: 2px solid var(--border);
        color: var(--text-mid);
        cursor: pointer;
        transition: all 0.12s var(--ease);
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;

      }
      .allergen-pill .allergen-icon {
        font-size: 1.2rem;
      }
      .allergen-pill:hover {
        border-color: var(--red);
        color: var(--text);
      }
      .allergen-pill.selected {
        background: var(--red-soft);
        border-color: var(--red);
        color: var(--red);
      }
      .allergies-btns {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .allergies-btns button {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        border: 1px solid var(--border);
      }
      .btn-allergy-cancel {
        background: var(--card);
        color: var(--text-mid);
      }
      .btn-allergy-save {
        background: var(--gold);
        color: var(--bg);
        border-color: var(--gold);
        font-weight: 600;
      }

      .note-allergies-badge {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.72rem;
        color: var(--red);
        background: var(--red-soft);
        padding: 3px 8px;
        border-radius: 12px;
        margin-left: 8px;
        flex-wrap: wrap;
        max-width: 200px;
      }
      .note-allergies-badge:empty {
        display: none;
      }
    </style>
  </head>

        <div class="order-sheet" id="orderSheet">
