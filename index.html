              <button class="btn-back-to-menu" id="backToMenuBtn">← Back to Menu</button>
              <button class="btn-reset" id="clearBtn">Clear Items</button>
            </div>
          </div>
        </div>
      </div>

      <!-- FAB: View Order -->
      <button class="order-fab" id="orderFab">
        <span class="order-fab-icon">📋</span>
        <span class="order-fab-label">View Order</span>
        <span class="order-fab-count" id="noteBadge"></span>
      </button>

      <!-- Misc Item Button -->
      <button class="misc-item-btn" id="miscItemBtn">
        <span class="misc-icon">✨</span>
        <span>Misc. Item</span>
      </button>

      <!-- Misc Item Modal -->
      <div class="misc-modal-overlay" id="miscModalOverlay">
        <div class="misc-modal">
          <h3><span class="misc-icon">✨</span> Add Misc. Item</h3>
          <label>Item Name</label>
          <input type="text" id="miscItemName" placeholder="e.g. Extra sauce, off-menu request…" />
          <label>Notes (optional)</label>
          <textarea id="miscItemNote" placeholder="Any details or special instructions…"></textarea>
          <div class="misc-btns">
            <button class="btn-misc-cancel" id="miscCancel">Cancel</button>
            <button class="btn-misc-add" id="miscAdd">Add to Note</button>
          </div>
        </div>
      </div>

      <!-- Shared Note Button -->
      <button class="shared-note-btn" id="sharedNoteBtn">
        <span>📋</span>
        <span>Specials</span>
      </button>

      <!-- Shared Note Modal -->
      <div class="shared-note-overlay" id="sharedNoteOverlay">
        <div class="shared-note-modal">
          <div class="shared-note-header">
            <h3>📋 Today's Specials</h3>
            <div class="shared-note-sync" id="sharedNoteSync">
              <span class="sync-dot"></span>
              <span id="syncText">Synced</span>
            </div>
          </div>
          <div class="shared-note-body">
            <div class="shared-note-section">
              <label>🍲 Soup</label>
              <textarea id="soupNote" placeholder="e.g. Tomato Basil, French Onion..."></textarea>
            </div>
            <div class="shared-note-section">
              <label>🍰 Cheesecake</label>
              <textarea id="cheesecakeNote" placeholder="e.g. Biscoff, Oreo, Strawberry..."></textarea>
            </div>
            <div class="shared-note-section">
              <label>🧁 Pavlova</label>
              <textarea id="pavlovaNote" placeholder="e.g. Mixed Berry, Passion Fruit..."></textarea>
            </div>
            <div class="shared-note-section">
              <label>🔥 Baked Alaska</label>
              <textarea id="bakedAlaskaNote" placeholder="e.g. Chocolate, Raspberry..."></textarea>
            </div>
            <div class="shared-note-section">
              <label>🍮 Crème Brûlée</label>
              <textarea id="cremeBruleeNote" placeholder="e.g. Classic Vanilla, Lavender..."></textarea>
            </div>
            <div class="shared-note-section">
              <label>✨ Other Specials</label>
              <textarea id="otherSpecialsNote" placeholder="Any other specials today..."></textarea>
            </div>
          </div>
          <div class="shared-note-footer">
            <button class="btn-shared-close" id="sharedNoteClose">Close</button>
            <button class="btn-shared-refresh" id="sharedNoteRefresh">↻ Refresh</button>
            <button class="btn-shared-save" id="sharedNoteSave">Save</button>
          </div>
        </div>
      </div>

      <!-- Choices modal -->
      <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
          <div class="modal-head">
            <h3 id="modalTitle"></h3>
            <div class="modal-sub" id="modalSub"></div>
          </div>
          <div class="modal-body" id="modalBody"></div>
          <div class="modal-foot">
            <button class="btn-modal-cancel" id="modalCancel">Cancel</button>
            <button class="btn-modal-add" id="modalAdd">Add to Note</button>
          </div>
        </div>
      </div>

      <!-- Confirm -->
      <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
          <p>Clear all items from this table?</p>
          <div class="cbtns">
            <button class="btn-ccancel" id="confirmCancel">Cancel</button>
            <button class="btn-cconfirm" id="confirmYes">Clear</button>
          </div>
        </div>
      </div>

    </div>

    <!-- Allergies Modal (outside app-view so it works from the tables screen too) -->
    <div class="allergies-overlay" id="allergiesOverlay">
      <div class="allergies-modal">
        <h3>⚠️ Allergens for this table</h3>
        <div class="allergy-hint">Tap to select. These will be shown on the order.</div>
        <div class="allergen-grid" id="allergenGrid">
          <!-- Populated by JS -->
        </div>
        <div class="allergies-btns">
          <button class="btn-allergy-cancel" id="allergyCancel">Cancel</button>
          <button class="btn-allergy-save" id="allergySave">Save</button>
        </div>
      </div>
    </div>

    <div class="more-dropdown-backdrop" id="moreBackdrop"></div>
    <div class="more-dropdown" id="moreDropdown"></div>

    <script src="data.js"></script>
    <script>
      // ── Register Service Worker ──
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      }

      (() => {
        const DEBUG_SHOW_ALL_MENUS = location.search.includes("debug");

        // ═══════ 14 MAIN ALLERGENS ═══════
        const ALLERGENS = [
          { id: "celery", name: "Celery", icon: "🥬" },
          { id: "gluten", name: "Gluten", icon: "🌾" },
          { id: "crustaceans", name: "Crustaceans", icon: "🦐" },
          { id: "eggs", name: "Eggs", icon: "🥚" },
          { id: "fish", name: "Fish", icon: "🐟" },
          { id: "lupin", name: "Lupin", icon: "🌸" },
          { id: "milk", name: "Milk", icon: "🥛" },
          { id: "molluscs", name: "Molluscs", icon: "🦪" },
          { id: "mustard", name: "Mustard", icon: "🟡" },
          { id: "nuts", name: "Tree Nuts", icon: "🥜" },
          { id: "peanuts", name: "Peanuts", icon: "🥜" },
          { id: "sesame", name: "Sesame", icon: "🫘" },
          { id: "soya", name: "Soya", icon: "🫛" },
          { id: "sulphites", name: "Sulphites", icon: "🍷" },
        ];

        // ═══════ TABLES (1-31, but 13 shows as 36) ═══════
        const TABLES = [];
        for (let i = 1; i <= 31; i++) {
          TABLES.push({
            id: i,
            displayName: i === 13 ? "36" : String(i)
          });
        }

        // ═══════ SPECIALS TAB ═══════
        const SPECIALS_MENU_KEY = "__specials__";

        // ═══════ STATE ═══════
        let currentTableId = null;
        let tableData = {}; // { tableId: { items: [], allergies: [], itemId: 0, isOpen: false } }
        let pendingOpenTable = false;
        
        let activeMenu = null;
        let activeSection = null;
        let activeSubsection = null;
        let editingNoteId = null;
        let modalItemName = "";
        let modalItemData = {};
        let modalSelections = {};
        let tempAllergySelections = [];

        const $ = (id) => document.getElementById(id);

        // Elements
        const tablesViewEl = $("tablesView");
        const appViewEl = $("appView");
        const tablesGridEl = $("tablesGrid");
        const backToTablesBtnEl = $("backToTablesBtn");
        const currentTableBadgeEl = $("currentTableBadge");
        const menuTabsEl = $("menuTabs");
        const sectionTabsEl = $("sectionTabs");
        const subsectionTabsEl = $("subsectionTabs");
        const itemsGridEl = $("itemsGrid");
        const breadcrumbsEl = $("breadcrumbs");
        const noteListEl = $("noteList");
        const noteCountEl = $("noteCount");
        const noteBadgeEl = $("noteBadge");
        const confirmOverlayEl = $("confirmOverlay");
        const modalOverlayEl = $("modalOverlay");
        const modalTitleEl = $("modalTitle");
        const modalSubEl = $("modalSub");
        const modalBodyEl = $("modalBody");
        const orderSheetOverlayEl = $("orderSheetOverlay");
        const orderFabEl = $("orderFab");
        const searchInputEl = $("searchInput");
        const searchClearEl = $("searchClear");
        const searchResultsEl = $("searchResults");
        const searchContainerEl = searchInputEl.parentElement;
        const currentNoteTitleEl = $("currentNoteTitle");
        const noteAllergiesBadgeEl = $("noteAllergiesBadge");
        const allergiesOverlayEl = $("allergiesOverlay");
        const allergenGridEl = $("allergenGrid");
        const moreDropdownEl = $("moreDropdown");
        const moreBackdropEl = $("moreBackdrop");

        // ═══════ TABLE DATA HELPERS ═══════
        function getTableData(tableId) {
          if (!tableData[tableId]) {
            tableData[tableId] = { items: [], allergies: [], itemId: 0, isOpen: false };
          }
          return tableData[tableId];
        }

        function saveToSession() {
          sessionStorage.setItem('vg_tableData', JSON.stringify(tableData));
        }

        function loadFromSession() {
          const saved = sessionStorage.getItem('vg_tableData');
          if (saved) {
            try {
              tableData = JSON.parse(saved);
            } catch (e) {
              tableData = {};
            }
          }
        }

        // ═══════ TABLES VIEW ═══════
        function renderTablesGrid() {
          tablesGridEl.innerHTML = TABLES.map(t => {
            const data = tableData[t.id] || { items: [], allergies: [], isOpen: false };
            const itemCount = data.items.length;
            const hasAllergies = data.allergies && data.allergies.length > 0;
            const hasItems = itemCount > 0;
            const isOpen = data.isOpen || false;

            return `<button class="table-btn${hasItems ? ' has-items' : ''}${isOpen ? ' is-open' : ''}" data-table="${t.id}">
              ${isOpen ? '<span class="open-indicator"></span>' : ''}
              ${hasAllergies ? '<span class="allergy-dot"></span>' : ''}
              ${t.displayName}
              <span class="table-items">${itemCount} item${itemCount !== 1 ? 's' : ''}</span>
            </button>`;
          }).join('');

          tablesGridEl.querySelectorAll('.table-btn').forEach(btn => {
            const tableId = parseInt(btn.dataset.table);
            let pressTimer = null;
            let didLongPress = false;

            const startPress = () => {
              didLongPress = false;
              btn.classList.add('pressing');
              pressTimer = setTimeout(() => {
                didLongPress = true;
                pressTimer = null;
                btn.classList.remove('pressing');
                closeTableById(tableId);
              }, 600);
            };

            const cancelPress = () => {
              if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
              }
              btn.classList.remove('pressing');
            };

            btn.addEventListener('touchstart', startPress, { passive: true });
            btn.addEventListener('touchend', cancelPress);
            btn.addEventListener('touchmove', cancelPress);
            btn.addEventListener('touchcancel', cancelPress);
            btn.addEventListener('mousedown', startPress);
            btn.addEventListener('mouseup', cancelPress);
            btn.addEventListener('mouseleave', cancelPress);

            btn.addEventListener('click', () => {
              if (!didLongPress) openTable(tableId);
              didLongPress = false;
            });
          });
        }

        function openTable(tableId) {
          currentTableId = tableId;
          const data = getTableData(tableId);

          if (!data.isOpen) {
            // Table is closed — ask for allergies before opening
            pendingOpenTable = true;
            renderAllergenGrid();
            allergiesOverlayEl.classList.add('open');
          } else {
            navigateToTable(tableId);
          }
        }

        function navigateToTable(tableId) {
          const table = TABLES.find(t => t.id === tableId);
          tablesViewEl.classList.add('hidden');
          appViewEl.classList.remove('hidden');
          currentTableBadgeEl.textContent = `Table ${table.displayName}`;
          currentNoteTitleEl.textContent = `Table ${table.displayName}`;
          updateNoteHeader();
          renderNote();
          updateBadge();
        }

        function closeTable() {
          saveToSession();
          currentTableId = null;
          tablesViewEl.classList.remove('hidden');
          appViewEl.classList.add('hidden');
          renderTablesGrid();
        }

        function closeTableById(tableId) {
          const data = tableData[tableId];
          if (!data || !data.isOpen) return;
          tableData[tableId] = { items: [], allergies: [], itemId: 0, isOpen: false };
          saveToSession();
          renderTablesGrid();
        }

        backToTablesBtnEl.addEventListener('click', closeTable);

        // ═══════ ALLERGIES ═══════
        function renderAllergenGrid() {
          const data = getTableData(currentTableId);
          tempAllergySelections = [...(data.allergies || [])];
          
          allergenGridEl.innerHTML = ALLERGENS.map(a => {
            const selected = tempAllergySelections.includes(a.id);
            return `<div class="allergen-pill${selected ? ' selected' : ''}" data-id="${a.id}">
              <span class="allergen-icon">${a.icon}</span>
              <span>${a.name}</span>
            </div>`;
          }).join('');

          allergenGridEl.querySelectorAll('.allergen-pill').forEach(pill => {
            pill.addEventListener('click', () => {
              const id = pill.dataset.id;
              if (tempAllergySelections.includes(id)) {
                tempAllergySelections = tempAllergySelections.filter(a => a !== id);
                pill.classList.remove('selected');
              } else {
                tempAllergySelections.push(id);
                pill.classList.add('selected');
              }
            });
          });
        }

        function openAllergiesModal() {
          renderAllergenGrid();
          allergiesOverlayEl.classList.add('open');
        }

        function closeAllergiesModal() {
          allergiesOverlayEl.classList.remove('open');
        }

        function saveAllergies() {
          const data = getTableData(currentTableId);
          data.allergies = tempAllergySelections;

          if (pendingOpenTable) {
            pendingOpenTable = false;
            data.isOpen = true;
            saveToSession();
            closeAllergiesModal();
            navigateToTable(currentTableId);
          } else {
            saveToSession();
            updateNoteHeader();
            closeAllergiesModal();
          }
        }

        function cancelAllergiesModal() {
          if (pendingOpenTable) {
            pendingOpenTable = false;
            currentTableId = null;
          }
          closeAllergiesModal();
        }

        $("editAllergiesBtn").addEventListener('click', openAllergiesModal);
        $("allergyCancel").addEventListener('click', cancelAllergiesModal);
        $("allergySave").addEventListener('click', saveAllergies);
        allergiesOverlayEl.addEventListener('click', (e) => {
          if (e.target === allergiesOverlayEl) cancelAllergiesModal();
        });

        function updateNoteHeader() {
          if (!currentTableId) return;
          const data = getTableData(currentTableId);
          const table = TABLES.find(t => t.id === currentTableId);
          
          currentNoteTitleEl.textContent = `Table ${table.displayName}`;
          
          if (data.allergies && data.allergies.length > 0) {
            const names = data.allergies.map(id => {
              const a = ALLERGENS.find(x => x.id === id);
              return a ? a.name : id;
            });
            noteAllergiesBadgeEl.innerHTML = `⚠️ ${names.join(', ')}`;
          } else {
            noteAllergiesBadgeEl.innerHTML = '';
          }
        }

        // ═══════ NOTE MANAGEMENT ═══════
        function addToNote(name, choices, userNote) {
          if (!currentTableId) return;
          
          const data = getTableData(currentTableId);
          data.items.push({
            id: ++data.itemId,
            name,
            qty: 1,
            choices: choices || {},
            userNote: userNote || "",
          });
          saveToSession();
          renderNote();
          updateBadge();
          showToast(name);
        }

        function showToast(name) {
          const rack = $("toastRack");
          const el = document.createElement("div");
          el.className = "toast";
          el.innerHTML = `Added <span class="toast-name">${esc(name)}</span>`;
          rack.appendChild(el);
          setTimeout(() => el.remove(), 2100);
        }

        function removeItem(id) {
          if (!currentTableId) return;
          const data = getTableData(currentTableId);
          data.items = data.items.filter(n => n.id !== id);
          saveToSession();
          renderNote();
          updateBadge();
        }

        function startEditNote(id) {
          editingNoteId = id;
          renderNote();
          const inp = document.querySelector(`.inline-note-edit input[data-id="${id}"]`);
          if (inp) inp.focus();
        }

        function saveEditNote(id) {
          const inp = document.querySelector(`.inline-note-edit input[data-id="${id}"]`);
          if (!currentTableId) return;
          const data = getTableData(currentTableId);
          const item = data.items.find(n => n.id === id);
          if (item && inp) {
            item.userNote = inp.value.trim();
            saveToSession();
          }
          editingNoteId = null;
          renderNote();
        }

        function renderNote() {
          if (!currentTableId) {
            noteListEl.innerHTML = `<div class="note-empty"><div class="note-empty-icon">📝</div>Select a table first</div>`;
            noteCountEl.textContent = "0";
            return;
          }

          const data = getTableData(currentTableId);
          const items = data.items || [];
          noteCountEl.textContent = items.length;

          if (items.length === 0) {
            noteListEl.innerHTML = `<div class="note-empty"><div class="note-empty-icon">📝</div>Tap items to add them here</div>`;
            return;
          }

          noteListEl.innerHTML = items.map(n => {
            const choiceStr = Object.values(n.choices).filter(Boolean).join(" · ");
            const isEditing = editingNoteId === n.id;

            let noteArea = "";
            if (isEditing) {
              noteArea = `<div class="inline-note-edit">
                <input data-id="${n.id}" type="text" value="${esc(n.userNote)}" placeholder="Add note…">
                <button onclick="window._saveNote(${n.id})">Save</button>
              </div>`;
            } else if (n.userNote) {
              noteArea = `<div class="note-item-usernote">📎 ${n.userNote}</div>`;
            }

            return `<div class="note-item">
              <div class="note-item-row">
                <div class="note-item-info">
                  <div class="note-item-name">${n.name}</div>
                  ${choiceStr ? `<div class="note-item-choices">${choiceStr}</div>` : ""}
                </div>
                <div class="note-item-actions">
                  <button class="note-mini-btn edit" onclick="window._editNote(${n.id})" title="Add/edit note">📎</button>
                  <button class="note-mini-btn del" onclick="window._rm(${n.id})" title="Remove">✕</button>
                </div>
              </div>
              ${noteArea}
            </div>`;
          }).join("");

          document.querySelectorAll(".inline-note-edit input").forEach(inp => {
            inp.addEventListener("keydown", (e) => {
              if (e.key === "Enter") window._saveNote(parseInt(inp.dataset.id));
            });
          });
        }

        window._rm = removeItem;
        window._editNote = startEditNote;
        window._saveNote = saveEditNote;

        function updateBadge() {
          if (!currentTableId) {
            noteBadgeEl.textContent = '';
            return;
          }
          const data = getTableData(currentTableId);
          const count = data.items.length;
          noteBadgeEl.textContent = count > 0 ? count : '';
        }

        // ═══════ CLEAR / RESET ═══════
        function showConfirm() {
          if (!currentTableId) return;
          const data = getTableData(currentTableId);
          if (data.items.length === 0) return;
          confirmOverlayEl.classList.add("open");
        }

        function hideConfirm() {
          confirmOverlayEl.classList.remove("open");
        }

        function clearNote() {
          if (!currentTableId) return;
          const data = getTableData(currentTableId);
          data.items = [];
          data.itemId = 0;
          saveToSession();
          editingNoteId = null;
          renderNote();
          updateBadge();
          hideConfirm();
        }

        $("resetBtn").addEventListener("click", showConfirm);
        $("clearBtn").addEventListener("click", showConfirm);
        $("confirmCancel").addEventListener("click", hideConfirm);
        $("confirmYes").addEventListener("click", clearNote);
        confirmOverlayEl.addEventListener("click", (e) => {
          if (e.target === confirmOverlayEl) hideConfirm();
        });

        moreBackdropEl.addEventListener("click", closeMoreDropdown);

        // ═══════ ORDER SHEET ═══════
        function openSheet() {
          orderSheetOverlayEl.classList.add("open");
        }

        function closeSheet() {
          orderSheetOverlayEl.classList.remove("open");
        }

        orderFabEl.addEventListener("click", openSheet);
        $("backToMenuBtn").addEventListener("click", closeSheet);
        orderSheetOverlayEl.addEventListener("click", (e) => {
          if (e.target === orderSheetOverlayEl) closeSheet();
        });

        // ═══════ AVAILABILITY HELPERS ═══════
        function isMenuAvailable(menuKey) {
          if (DEBUG_SHOW_ALL_MENUS) return true;
          const avail = MENUS[menuKey].availability;
          if (!avail) return true;
          const now = new Date();
          const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
          const todayDay = days[now.getDay()];
          if (!avail.days.includes(todayDay)) return false;
          const [sh, sm] = avail.start.split(":").map(Number);
          const [eh, em] = avail.end.split(":").map(Number);
          const nowMins = now.getHours() * 60 + now.getMinutes();
          const startMins = sh * 60 + sm;
          const endMins = eh * 60 + em;
          return nowMins >= startMins && nowMins < endMins;
        }

        // ═══════ MENU RENDERING ═══════
        function renderMenuTabs() {
          const keys = Object.keys(MENUS);
          const hasOtherSpecials = !!(cachedSpecials && (cachedSpecials.otherSpecials || "").trim());
          const validKeys = hasOtherSpecials ? [...keys, SPECIALS_MENU_KEY] : keys;

          const hiddenKeys = keys.filter(k => !isMenuAvailable(k));
          const activeIsHidden = hiddenKeys.includes(activeMenu);

          if (!activeMenu || !validKeys.includes(activeMenu)) {
            activeMenu = keys.find(k => isMenuAvailable(k)) || keys[0];
          }

          const visibleTabs = validKeys.map(k => {
            if (k === SPECIALS_MENU_KEY) {
              return `<div class="menu-tab${k === activeMenu ? " active" : ""}" data-k="${k}">
                <span class="ti">✨</span>Specials
              </div>`;
            }
            const m = MENUS[k];
            const available = isMenuAvailable(k);
            return `<div class="menu-tab${k === activeMenu ? " active" : ""}${available ? "" : " unavail"}" data-k="${k}">
              <span class="ti">${m.icon}</span>${k}
            </div>`;
          }).join("");

          const moreTab = hiddenKeys.length > 0
            ? `<div class="menu-tab${activeIsHidden ? " active" : ""}" id="moreTab">
                <span class="ti">⋯</span>More
              </div>`
            : "";

          menuTabsEl.innerHTML = visibleTabs + moreTab;

          menuTabsEl.querySelectorAll(".menu-tab:not(#moreTab)").forEach(t => {
            t.addEventListener("click", () => {
              activeMenu = t.dataset.k;
              activeSection = null;
              activeSubsection = null;
              closeMoreDropdown();
              renderMenuTabs();
              renderSectionTabs();
              renderItems();
            });
          });

          const moreTabEl = $("moreTab");
          if (moreTabEl) {
            moreTabEl.addEventListener("click", (e) => {
              e.stopPropagation();
              const rect = moreTabEl.getBoundingClientRect();
              moreDropdownEl.innerHTML = hiddenKeys.map(k => {
                const m = MENUS[k];
                return `<div class="more-dropdown-item${k === activeMenu ? " active" : ""}" data-k="${k}">
                  <span class="di">${m.icon}</span>${k}
                </div>`;
              }).join("");
              moreDropdownEl.querySelectorAll(".more-dropdown-item").forEach(item => {
                item.addEventListener("click", () => {
                  activeMenu = item.dataset.k;
                  activeSection = null;
                  activeSubsection = null;
                  closeMoreDropdown();
                  renderMenuTabs();
                  renderSectionTabs();
                  renderItems();
                });
              });
              const dropW = 170;
              let left = rect.left;
              if (left + dropW > window.innerWidth) left = window.innerWidth - dropW - 8;
              moreDropdownEl.style.top = (rect.bottom + 4) + "px";
              moreDropdownEl.style.left = left + "px";
              moreDropdownEl.classList.toggle("open");
              moreBackdropEl.classList.toggle("open", moreDropdownEl.classList.contains("open"));
            });
          }
        }

        function closeMoreDropdown() {
          moreDropdownEl.classList.remove("open");
          moreBackdropEl.classList.remove("open");
        }

        function renderSectionTabs() {
          if (!activeMenu) return;
          if (activeMenu === SPECIALS_MENU_KEY) {
            sectionTabsEl.innerHTML = "";
            subsectionTabsEl.classList.remove("visible");
            return;
          }
          const secs = Object.keys(MENUS[activeMenu].sections);
          if (!activeSection || !secs.includes(activeSection)) activeSection = secs[0];
          sectionTabsEl.innerHTML = secs.map(s => 
            `<div class="section-tab${s === activeSection ? " active" : ""}" data-s="${s}">${s}</div>`
          ).join("");

          sectionTabsEl.querySelectorAll(".section-tab").forEach(t => {
            t.addEventListener("click", () => {
              activeSection = t.dataset.s;
              activeSubsection = null;
              renderSectionTabs();
              renderSubsectionTabs();
              renderItems();
            });
          });
          renderSubsectionTabs();
        }

        function renderSubsectionTabs() {
          if (!activeMenu || !activeSection) {
            subsectionTabsEl.classList.remove("visible");
            return;
          }
          const sec = MENUS[activeMenu].sections[activeSection];
          if (!sec || !sec.subsections) {
            subsectionTabsEl.classList.remove("visible");
            return;
          }
          const subs = Object.keys(sec.subsections);
          if (!activeSubsection || !subs.includes(activeSubsection)) activeSubsection = subs[0];
          subsectionTabsEl.classList.add("visible");
          subsectionTabsEl.innerHTML = subs.map(s =>
            `<div class="section-tab${s === activeSubsection ? " active" : ""}" data-s="${s}">${s}</div>`
          ).join("");

          subsectionTabsEl.querySelectorAll(".section-tab").forEach(t => {
            t.addEventListener("click", () => {
              activeSubsection = t.dataset.s;
              renderSubsectionTabs();
              renderItems();
            });
          });
        }

        function getSpecialForItem(name) {
          if (!cachedSpecials) return "";
          const lower = name.toLowerCase();
          if (lower.includes("soup")) return cachedSpecials.soup || "";
          if (lower.includes("cheesecake")) return cachedSpecials.cheesecake || "";
          if (lower.includes("pavlova")) return cachedSpecials.pavlova || "";
          if (lower.includes("baked alaska")) return cachedSpecials.bakedAlaska || "";
          if (lower.includes("br") && (lower.includes("brulee") || lower.includes("brûlée"))) return cachedSpecials.cremeBrulee || "";
          return "";
        }

        function renderItems() {
          if (!activeMenu) return;

          if (activeMenu === SPECIALS_MENU_KEY) {
            const text = (cachedSpecials && cachedSpecials.otherSpecials) || "";
            const specials = text.split(",").map(s => s.trim()).filter(Boolean);
            if (specials.length === 0) {
              itemsGridEl.innerHTML = `<div class="no-specials-msg">No other specials today.</div>`;
              return;
            }
            itemsGridEl.innerHTML = specials.map(name =>
              `<div class="item-card" data-name="${esc(name)}">
                <div class="iname">${esc(name)}</div>
              </div>`
            ).join("");
            itemsGridEl.querySelectorAll(".item-card").forEach(card => {
              card.addEventListener("click", () => {
                addToNote(card.dataset.name, {}, "");
                flashCard(card);
              });
            });
            return;
          }

          if (!activeSection) return;
          const sec = MENUS[activeMenu].sections[activeSection];
          if (!sec) {
            itemsGridEl.innerHTML = "";
            return;
          }
          const items = sec.subsections ? sec.subsections[activeSubsection] : sec;
          if (!items) {
            itemsGridEl.innerHTML = "";
            return;
          }

          itemsGridEl.innerHTML = Object.entries(items).map(([name, data]) => {
            const priceHtml = data.price ? `<div class="iprice">£${data.price.toFixed(2)}</div>` : "";
            let dietaryHtml = "";
            if (data.dietary && data.dietary.length > 0) {
              const tagLabels = { V: "V", VG: "VG", GF: "GF", GFA: "GFA", VGA: "VGA" };
              const tagTitles = { V: "Vegetarian", VG: "Vegan", GF: "Gluten-Free", GFA: "Gluten-Free Available", VGA: "Vegan Available" };
              dietaryHtml = `<div class="idietary">${data.dietary.map(d =>
                `<span class="dietary-tag ${d.toLowerCase()}" title="${tagTitles[d] || d}">${tagLabels[d] || d}</span>`
              ).join("")}</div>`;
            }
            const special = getSpecialForItem(name);
            const specialHtml = special ? `<div class="ispecial">${formatSpecial(special)}</div>` : "";
            return `<div class="item-card" data-name="${esc(name)}">
              <div class="iname">${name}</div>
              ${priceHtml}
              ${specialHtml}
              ${dietaryHtml}
            </div>`;
          }).join("");

          itemsGridEl.querySelectorAll(".item-card").forEach(card => {
            card.addEventListener("click", () => {
              const name = card.dataset.name;
              const data = items[name];
              handleItemTap(name, data, card);
            });
          });
        }

        // ═══════ ITEM TAP ═══════
        function handleItemTap(name, data, cardEl) {
          if (data.scoopBuilder) {
            openScoopModal(name, data.scoopBuilder);
          } else if (data.choices && Object.keys(data.choices).length > 0) {
            openModal(name, data);
          } else {
            addToNote(name, {}, "");
            flashCard(cardEl);
          }
        }

        function flashCard(el) {
          el.classList.remove("flash");
          void el.offsetWidth;
          el.classList.add("flash");
        }

        // ═══════ SCOOP BUILDER ═══════
        let scoopBuilderName = "";
        let scoopBuilderFlavours = [];
        let scoopCount = 0;

        function openScoopModal(name, builder) {
          scoopBuilderName = name;
          scoopBuilderFlavours = builder.flavours;
          scoopCount = 0;
          modalItemName = name;
          modalTitleEl.textContent = name;
          modalSubEl.textContent = "";
          renderScoopModal(builder.maxScoops);
          modalOverlayEl.classList.add("open");
        }

        function renderScoopModal(maxScoops) {
          const scoopNums = Array.from({ length: maxScoops }, (_, i) => i + 1);
          let html = `<div class="choice-group">
            <div class="choice-group-label">Scoops</div>
            <div class="choice-options">
              ${scoopNums.map(n => `<div class="choice-pill scoop-count-pill${scoopCount === n ? " selected" : ""}" data-scoops="${n}">${n} Scoop${n > 1 ? "s" : ""}</div>`).join("")}
            </div>
          </div>
          <div id="scoopFlavourPickers"></div>
          <div class="modal-note-section">
            <label>Add a note (optional)</label>
            <input class="modal-note-input" id="modalNoteInput" type="text" placeholder="e.g. in a cone, extra sauce…">
          </div>`;
          modalBodyEl.innerHTML = html;
          modalBodyEl.querySelectorAll(".scoop-count-pill").forEach(pill => {
            pill.addEventListener("click", () => {
              scoopCount = parseInt(pill.dataset.scoops);
              modalBodyEl.querySelectorAll(".scoop-count-pill").forEach(p => p.classList.remove("selected"));
              pill.classList.add("selected");
              renderFlavourPickers();
            });
          });
        }

        function renderFlavourPickers() {
          const container = document.getElementById("scoopFlavourPickers");
          if (!container) return;
          let html = "";
          for (let i = 1; i <= scoopCount; i++) {
            html += `<div class="choice-group">
              <div class="choice-group-label">Scoop ${i}</div>
              <div class="choice-options">
                ${scoopBuilderFlavours.map(f => `<div class="choice-pill scoop-flavour-pill" data-scoop="${i}" data-val="${esc(f)}">${f}</div>`).join("")}
              </div>
            </div>`;
          }
          container.innerHTML = html;
          container.querySelectorAll(".scoop-flavour-pill").forEach(pill => {
            pill.addEventListener("click", () => {
              const s = pill.dataset.scoop;
              container.querySelectorAll(`.scoop-flavour-pill[data-scoop="${s}"]`).forEach(p => p.classList.remove("selected"));
              pill.classList.add("selected");
            });
          });
        }

        // ═══════ CHOICES MODAL ═══════
        function openModal(name, data) {
          modalItemName = name;
          modalItemData = data;
          modalSelections = {};
          modalTitleEl.textContent = name;
          modalSubEl.textContent = "";

          let html = "";
          if (data.choices) {
            for (const [group, options] of Object.entries(data.choices)) {
              html += `<div class="choice-group">
                <div class="choice-group-label">${group}</div>
                <div class="choice-options">
                  ${options.map(o => `<div class="choice-pill" data-group="${esc(group)}" data-val="${esc(o)}">${o}</div>`).join("")}
                </div>
              </div>`;
            }
          }
          html += `<div class="modal-note-section">
            <label>Add a note (optional)</label>
            <input class="modal-note-input" id="modalNoteInput" type="text" placeholder="e.g. no onions, extra sauce…">
          </div>`;
          modalBodyEl.innerHTML = html;

          modalBodyEl.querySelectorAll(".choice-pill").forEach(pill => {
            pill.addEventListener("click", () => {
              const g = pill.dataset.group;
              modalBodyEl.querySelectorAll(`.choice-pill[data-group="${CSS.escape(g)}"]`).forEach(p => p.classList.remove("selected"));
              pill.classList.add("selected");
              modalSelections[g] = pill.dataset.val;
            });
          });
          modalOverlayEl.classList.add("open");
        }

        function closeModal() {
          modalOverlayEl.classList.remove("open");
          scoopCount = 0;
        }

        $("modalCancel").addEventListener("click", closeModal);
        modalOverlayEl.addEventListener("click", (e) => {
          if (e.target === modalOverlayEl) closeModal();
        });

        $("modalAdd").addEventListener("click", () => {
          const userNote = ($("modalNoteInput")?.value || "").trim();
          if (scoopCount > 0 && modalBodyEl.querySelector(".scoop-count-pill")) {
            const flavours = [];
            for (let i = 1; i <= scoopCount; i++) {
              const sel = modalBodyEl.querySelector(`.scoop-flavour-pill[data-scoop="${i}"].selected`);
              flavours.push(sel ? sel.dataset.val : "?");
            }
            const choiceStr = `${scoopCount} Scoop${scoopCount > 1 ? "s" : ""}: ${flavours.join(", ")}`;
            addToNote(scoopBuilderName, { Scoops: choiceStr }, userNote);
            scoopCount = 0;
          } else {
            addToNote(modalItemName, { ...modalSelections }, userNote);
          }
          closeModal();
          const cards = itemsGridEl.querySelectorAll(".item-card");
          cards.forEach(c => {
            if (c.dataset.name === modalItemName) flashCard(c);
          });
        });

        // ═══════ MISC ITEM ═══════
        const miscModalOverlayEl = $("miscModalOverlay");
        const miscItemNameEl = $("miscItemName");
        const miscItemNoteEl = $("miscItemNote");

        function openMiscModal() {
          miscItemNameEl.value = "";
          miscItemNoteEl.value = "";
          miscModalOverlayEl.classList.add("open");
          setTimeout(() => miscItemNameEl.focus(), 100);
        }

        function closeMiscModal() {
          miscModalOverlayEl.classList.remove("open");
        }

        function addMiscItem() {
          const name = miscItemNameEl.value.trim();
          if (!name) {
            miscItemNameEl.focus();
            return;
          }
          const userNote = miscItemNoteEl.value.trim();
          addToNote(`✨ ${name}`, { Type: "Misc. Item" }, userNote);
          closeMiscModal();
        }

        $("miscItemBtn").addEventListener("click", openMiscModal);
        $("miscCancel").addEventListener("click", closeMiscModal);
        $("miscAdd").addEventListener("click", addMiscItem);
        miscModalOverlayEl.addEventListener("click", (e) => {
          if (e.target === miscModalOverlayEl) closeMiscModal();
        });
        miscItemNameEl.addEventListener("keydown", (e) => {
          if (e.key === "Enter") addMiscItem();
        });

        // ═══════ SEARCH ═══════
        let searchIndex = [];

        function buildSearchIndex() {
          searchIndex = [];
          for (const [menuKey, menu] of Object.entries(MENUS)) {
            for (const [sectionKey, section] of Object.entries(menu.sections)) {
              if (section.subsections) {
                for (const [subKey, items] of Object.entries(section.subsections)) {
                  for (const [itemName, itemData] of Object.entries(items)) {
                    searchIndex.push({
                      name: itemName,
                      data: itemData,
                      menu: menuKey,
                      section: sectionKey,
                      subsection: subKey,
                      path: `${menuKey} › ${sectionKey} › ${subKey}`,
                    });
                  }
                }
              } else {
                for (const [itemName, itemData] of Object.entries(section)) {
                  searchIndex.push({
                    name: itemName,
                    data: itemData,
                    menu: menuKey,
                    section: sectionKey,
                    subsection: null,
                    path: `${menuKey} › ${sectionKey}`,
                  });
                }
              }
            }
          }
        }

        function performSearch(query) {
          if (!query.trim()) return [];
          const q = query.toLowerCase().trim();
          const words = q.split(/\s+/);
          return searchIndex.filter(item => {
            const name = item.name.toLowerCase();
            const path = item.path.toLowerCase();
            return words.every(word => name.includes(word) || path.includes(word));
          }).sort((a, b) => {
            const aStarts = a.name.toLowerCase().startsWith(q);
            const bStarts = b.name.toLowerCase().startsWith(q);
            if (aStarts && !bStarts) return -1;
            if (!aStarts && bStarts) return 1;
            return a.name.localeCompare(b.name);
          });
        }

        function renderSearchResults(results, query) {
          if (results.length === 0 && query.trim()) {
            searchResultsEl.classList.add("active");
            searchResultsEl.innerHTML = `<div class="search-no-results"><div class="nricon">🔍</div><p>No items found for "${esc(query)}"</p></div>`;
            return;
          }
          if (results.length === 0) {
            searchResultsEl.classList.remove("active");
            searchResultsEl.innerHTML = "";
            return;
          }
          searchResultsEl.classList.add("active");
          const resultsHtml = results.map(item => {
            let priceHtml = "";
            if (item.data.price) {
              priceHtml = `<div class="iprice">£${item.data.price.toFixed(2)}</div>`;
            }
            let dietaryHtml = "";
            if (item.data.dietary && item.data.dietary.length > 0) {
              const tagLabels = { V: "V", VG: "VG", GF: "GF", GFA: "GFA", VGA: "VGA" };
              dietaryHtml = `<div class="idietary">${item.data.dietary.map(d =>
                `<span class="dietary-tag ${d.toLowerCase()}">${tagLabels[d] || d}</span>`
              ).join("")}</div>`;
            }
            const special = getSpecialForItem(item.name);
            const specialHtml = special ? `<div class="ispecial">${formatSpecial(special)}</div>` : "";
            return `<div class="search-item-card" data-name="${esc(item.name)}" data-menu="${esc(item.menu)}" data-section="${esc(item.section)}" data-sub="${esc(item.subsection || "")}">
              <div class="iname">${highlightMatch(item.name, query)}</div>
              ${priceHtml}
              ${specialHtml}
              <div class="imeta"><span class="loc">${item.menu}</span> ${item.section}${item.subsection ? " › " + item.subsection : ""}</div>
              ${dietaryHtml}
            </div>`;
          }).join("");

          searchResultsEl.innerHTML = `
            <div class="search-results-header">
              <div class="search-results-title">Search Results</div>
              <div class="search-results-count">${results.length} item${results.length !== 1 ? "s" : ""}</div>
            </div>
            <div class="search-results-grid">${resultsHtml}</div>`;

          searchResultsEl.querySelectorAll(".search-item-card").forEach(card => {
            card.addEventListener("click", () => {
              const name = card.dataset.name;
              const menuKey = card.dataset.menu;
              const sectionKey = card.dataset.section;
              const subKey = card.dataset.sub || null;
              const item = searchIndex.find(i =>
                i.name === name && i.menu === menuKey && i.section === sectionKey && i.subsection === subKey
              );
              if (item) {
                handleItemTap(item.name, item.data, card);
                flashCard(card);
              }
            });
          });
        }

        function highlightMatch(text, query) {
          if (!query.trim()) return esc(text);
          const escaped = esc(text);
          const words = query.toLowerCase().trim().split(/\s+/);
          let result = escaped;
          words.forEach(word => {
            const regex = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi");
            result = result.replace(regex, "<mark>$1</mark>");
          });
          return result;
        }

        function clearSearch() {
          searchInputEl.value = "";
          searchContainerEl.classList.remove("has-query");
          renderSearchResults([], "");
        }

        searchInputEl.addEventListener("input", (e) => {
          const query = e.target.value;
          searchContainerEl.classList.toggle("has-query", query.length > 0);
          const results = performSearch(query);
          renderSearchResults(results, query);
        });

        searchInputEl.addEventListener("keydown", (e) => {
          if (e.key === "Escape") {
            clearSearch();
            searchInputEl.blur();
          }
        });

        searchClearEl.addEventListener("click", clearSearch);
        buildSearchIndex();

        // ═══════ HELPERS ═══════
        function esc(s) {
          return (s || "").replace(/"/g, "&quot;").replace(/</g, "&lt;");
        }
        function formatSpecial(s) {
          return esc(s).replace(/18\+/gi, '<span class="challenge25">C25</span>');
        }

        // ═══════ SHARED NOTE (Firestore) ═══════
        const FIREBASE_PROJECT_ID = "venues-notes";
        const FIRESTORE_URL = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents`;

        const sharedNoteOverlayEl = $("sharedNoteOverlay");
        const soupNoteEl = $("soupNote");
        const cheesecakeNoteEl = $("cheesecakeNote");
        const pavlovaNoteEl = $("pavlovaNote");
        const bakedAlaskaNoteEl = $("bakedAlaskaNote");
        const cremeBruleeNoteEl = $("cremeBruleeNote");
        const otherSpecialsNoteEl = $("otherSpecialsNote");
        const sharedNoteSyncEl = $("sharedNoteSync");

        let cachedSpecials = null;

        function updateSyncStatus(status) {
          sharedNoteSyncEl.className = "shared-note-sync " + status;
          $("syncText").textContent = status === "synced" ? "Synced" : status === "syncing" ? "Syncing..." : "Error";
        }

        function parseFirestoreDoc(doc) {
          const fields = doc.fields || {};
          const result = {};
          for (const [key, val] of Object.entries(fields)) {
            result[key] = val.stringValue || "";
          }
          return result;
        }

        function toFirestoreDoc(obj) {
          const fields = {};
          for (const [key, val] of Object.entries(obj)) {
            fields[key] = { stringValue: String(val) };
          }
          return { fields };
        }

        async function loadSharedNote(forceRefresh = false) {
          if (cachedSpecials && !forceRefresh) {
            populateFields(cachedSpecials);
            updateSyncStatus("synced");
            return;
          }
          try {
            updateSyncStatus("syncing");
            const res = await fetch(`${FIRESTORE_URL}/specials/today`);
            if (res.status === 404) {
              cachedSpecials = {};
              populateFields({});
              updateSyncStatus("synced");
              return;
            }
            if (!res.ok) throw new Error("Failed to load");
            const doc = await res.json();
            const data = parseFirestoreDoc(doc);
            cachedSpecials = data;
            populateFields(data);
            updateSyncStatus("synced");
          } catch (e) {
            console.error("Load error:", e);
            updateSyncStatus("error");
          }
        }

        function populateFields(data) {
          soupNoteEl.value = data.soup || "";
          cheesecakeNoteEl.value = data.cheesecake || "";
          pavlovaNoteEl.value = data.pavlova || "";
          bakedAlaskaNoteEl.value = data.bakedAlaska || "";
          cremeBruleeNoteEl.value = data.cremeBrulee || "";
          otherSpecialsNoteEl.value = data.otherSpecials || "";
          renderMenuTabs();
          renderSectionTabs();
          renderItems();
        }

        async function saveSharedNote() {
          try {
            updateSyncStatus("syncing");
            const data = {
              soup: soupNoteEl.value,
              cheesecake: cheesecakeNoteEl.value,
              pavlova: pavlovaNoteEl.value,
              bakedAlaska: bakedAlaskaNoteEl.value,
              cremeBrulee: cremeBruleeNoteEl.value,
              otherSpecials: otherSpecialsNoteEl.value,
              lastUpdated: new Date().toISOString(),
            };
            const res = await fetch(`${FIRESTORE_URL}/specials/today`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(toFirestoreDoc(data)),
            });
            if (!res.ok) throw new Error("Failed to save");
            cachedSpecials = data;
            updateSyncStatus("synced");
            renderMenuTabs();
            renderSectionTabs();
            renderItems();
          } catch (e) {
            console.error("Save error:", e);
            updateSyncStatus("error");
          }
        }

        function openSharedNote() {
          sharedNoteOverlayEl.classList.add("open");
          loadSharedNote();
        }

        function closeSharedNote() {
          sharedNoteOverlayEl.classList.remove("open");
          renderMenuTabs();
          renderSectionTabs();
          renderItems();
        }

        $("sharedNoteBtn").addEventListener("click", openSharedNote);
        $("sharedNoteClose").addEventListener("click", closeSharedNote);
        $("sharedNoteRefresh").addEventListener("click", () => loadSharedNote(true));
        $("sharedNoteSave").addEventListener("click", async () => {
          await saveSharedNote();
          closeSharedNote();
        });
        sharedNoteOverlayEl.addEventListener("click", (e) => {
          if (e.target === sharedNoteOverlayEl) closeSharedNote();
        });

        // ═══════ BOOT ═══════
        loadFromSession();
        renderTablesGrid();
        renderMenuTabs();
        renderSectionTabs();
        renderItems();
        loadSharedNote();
      })();
    </script>
  </body>
</html>
