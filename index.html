<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#c8973a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VG Orders">
  <title>VG Orders</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ═══════════════════════════ LOGIN -->
  <div id="screen-login" class="screen">
    <div class="login-container">

      <div class="login-top">
        <div class="login-logo">
          <img src="icon-192.png" alt="VG" class="login-logo-img">
          <h1>VG Orders</h1>
          <p>Venney's at the Granby</p>
          <p class="tagline">Order note-taking system for front-of-house staff.</p>
        </div>
      </div>

      <div class="login-card">
        <h2>Select your name</h2>
        <div id="user-select-list" class="user-select-list">
          <div style="color:var(--text-dim);font-size:0.9rem;text-align:center;padding:1rem;">Loading...</div>
        </div>
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════ PIN OVERLAY (floating popup) -->
  <div class="pin-overlay" id="pin-overlay">
    <div class="pin-popup">
      <div class="pin-popup-user" id="pin-popup-user"></div>
      <div class="pin-label">Enter PIN</div>
      <div class="pin-dots">
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
      </div>
      <div class="pin-pad">
        <button class="pin-key" onclick="pinPress('1')">1</button>
        <button class="pin-key" onclick="pinPress('2')">2</button>
        <button class="pin-key" onclick="pinPress('3')">3</button>
        <button class="pin-key" onclick="pinPress('4')">4</button>
        <button class="pin-key" onclick="pinPress('5')">5</button>
        <button class="pin-key" onclick="pinPress('6')">6</button>
        <button class="pin-key" onclick="pinPress('7')">7</button>
        <button class="pin-key" onclick="pinPress('8')">8</button>
        <button class="pin-key" onclick="pinPress('9')">9</button>
        <button class="pin-key" style="visibility:hidden"></button>
        <button class="pin-key" onclick="pinPress('0')">0</button>
        <button class="pin-key del" onclick="pinPress('del')">⌫</button>
      </div>
      <button class="pin-cancel-btn" onclick="closePinOverlay()">Cancel</button>
    </div>
  </div>

  <!-- ═══════════════════════════ TABLES -->
  <div id="screen-tables" class="screen">
    <div class="tables-header">
      <img src="icon-192.png" alt="VG" style="width:28px;height:28px;border-radius:6px;">
      <span class="logo-small">VG Orders</span>
      <div class="header-right">
        <span class="header-user-label">Signed in as <strong id="header-user-name"></strong></span>
        <button class="hdr-btn" id="test-mode-btn" onclick="toggleTestMode()">🧪 Test Mode</button>
        <button class="hdr-btn" onclick="showPinChange()">Change PIN</button>
        <button class="hdr-btn" onclick="logout()">Sign out</button>
        <button class="hdr-btn danger" onclick="showCloseAll()">Close All Tables</button>
      </div>
    </div>
    <div class="tables-grid-scroll">
      <div id="tables-grid" class="tables-grid"></div>
    </div>
  </div>

  <!-- ═══════════════════════════ TABLE DETAIL -->
  <div id="screen-table" class="screen">

    <div class="table-detail-header">
      <button class="back" onclick="goTo('tables')">‹</button>
      <h2 id="table-detail-title">Table</h2>
      <button class="allergen-badge" id="allergen-badge" onclick="showAllergenModal(currentTableId, false)">
        ⚠ Allergens
      </button>
      <button class="close-table-btn" onclick="closeTable(currentTableId)">Close Table</button>
    </div>

    <div id="allergen-info-bar" class="allergen-info-bar"></div>

    <div class="table-body">
      <div class="orders-scroll">
        <div id="order-cards" class="order-cards"></div>
      </div>

      <div class="add-order-bar">
        <button class="add-order-btn" onclick="showAddOrderModal()">+ Add Order</button>
        <button class="pin-change-link" onclick="showPinChange()">Change PIN</button>
      </div>
    </div>

  </div>

  <!-- ═══════════════════════════ VAULT (admin) -->
  <div id="screen-vault" class="screen">
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
